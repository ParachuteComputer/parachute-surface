# Release workflow — triggered by pushing a semver tag.
#
# This workflow publishes TWO packages on different tag namespaces:
#
#   - @openparachute/app          ← tag prefix `v...`        (from packages/app-host)
#   - @openparachute/app-client   ← tag prefix `client-v...` (from packages/app-client)
#
# Both packages have npm Trusted Publisher rules pointing at this workflow
# file. Jobs gate on the tag prefix so only one package publishes per tag
# push. Independent release cadences.
#
# Tag conventions (matches parachute-patterns governance rule 2):
#   - rc:     v<X>.<Y>.<Z>-rc.<N>          (e.g. v0.2.0-rc.10)
#                                          (client-v0.1.0-rc.4)
#   - stable: v<X>.<Y>.<Z>                 (e.g. v0.2.0)
#                                          (client-v0.1.0)
#
# Release flow:
#   1. When ready to ship: bump version in the relevant package.json on main
#      (packages/app-host/ for app, packages/app-client/ for app-client).
#   2. Push a matching tag:
#        # for app
#        VERSION="v$(bun -e "console.log(require('./packages/app-host/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for app-client
#        VERSION="client-v$(bun -e "console.log(require('./packages/app-client/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#   3. CI runs tests once (workspace-wide), then publishes the package matching
#      the tag prefix.
#
# Operator setup (one-time) — see RELEASING.md:
#   - npm Trusted Publisher rules: one per package (app, app-client).
#     Both rules point at: org=ParachuteComputer, repo=parachute-app,
#     workflow=release.yml, env blank.
#   - No NPM_TOKEN secret needed; OIDC.

name: Release

on:
  push:
    tags:
      # App release tags
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # App-client release tags
      - 'client-v[0-9]+.[0-9]+.[0-9]+'
      - 'client-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

concurrency:
  # Don't let two releases race on the same tag.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: install deps
        # Workspace root install — picks up packages/app-host, packages/app-client,
        # and web/admin (the bundled admin SPA).
        run: bun install --frozen-lockfile
      - name: typecheck
        # Root script typechecks both app-host + app-client.
        run: bun run typecheck
      - name: tests
        # Root script runs app-host + app-client suites.
        run: bun run test

  publish-app-npm:
    name: publish @openparachute/app to npm
    needs: test
    # App-only: skip on client tags.
    if: ${{ !startsWith(github.ref_name, 'client-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance attestation + Trusted Publishing OIDC.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11.5+ which has Trusted Publishing OIDC
          # support built in. Node 20 LTS only has npm 10 and would
          # silently fall back to token auth (failing without NPM_TOKEN).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root brings in the admin SPA's deps too,
        # so the `build` step below can build dist/admin/.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Defense against tag-vs-package.json drift. If they don't match,
        # we'd publish under the wrong version. We pin on app-host's
        # package.json — that's the package this workflow publishes.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/app-host/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/app-host/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: build app-host (bundles admin SPA into dist/)
        # app-host's `files` includes `dist/admin/**`, so the admin SPA
        # must be built before `npm publish` packs the tarball. The
        # package.json has no prepack/prepublishOnly hook, so we run
        # the build explicitly here.
        working-directory: packages/app-host
        run: bun run build
      - name: publish
        # Trusted Publishing: npm verifies the OIDC token from this workflow
        # against the package's configured trusted publisher rule
        # (org=ParachuteComputer, repo=parachute-app, workflow=release.yml).
        # No NPM_TOKEN secret needed; `id-token: write` permission above
        # makes the OIDC token available to npm CLI.
        working-directory: packages/app-host
        run: |
          # Detect rc vs stable from tag name. Tag pattern in `on:` above
          # enforces the shape, so this is just disambiguation.
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/app with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-app-client-npm:
    name: publish @openparachute/app-client to npm
    needs: test
    # app-client-only: skip on app (`v*`) tags.
    if: ${{ startsWith(github.ref_name, 'client-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against app-client's package.json — that's the package this
        # job publishes. Tag prefix is `client-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/app-client/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#client-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/app-client/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: publish
        # app-client's package.json has `prepublishOnly: bun run build`, so
        # `npm publish` will build (tsc) before packing. No explicit build
        # step needed here.
        working-directory: packages/app-client
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/app-client with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance
