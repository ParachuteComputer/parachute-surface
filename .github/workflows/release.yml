# Release workflow — triggered by pushing a semver tag.
#
# This workflow publishes SIX packages to npm on different tag namespaces,
# plus ONE GitHub-release tarball (docs-editor, which is private:true — its
# distribution is the release asset, not npm):
#
#   - @openparachute/surface        ← tag prefix `v...`           (from packages/surface-host)
#   - @openparachute/surface-client ← tag prefix `client-v...`    (from packages/surface-client)
#   - @openparachute/surface-render ← tag prefix `render-v...`    (from packages/surface-render)
#   - @openparachute/notes-ui       ← tag prefix `notes-ui-v...`  (from packages/notes-ui)
#   - @openparachute/doc-schema     ← tag prefix `doc-schema-v...` (from packages/doc-schema)
#   - @openparachute/surface-server ← tag prefix `server-v...`    (from packages/surface-server)
#   - docs-editor release tarball   ← tag prefix `docs-editor-v...` (from packages/docs-editor;
#                                     attaches docs-editor-surface-<v>.tgz to a GitHub Release)
#   - meeting-ingest release tarball ← tag prefix `meeting-ingest-v...` (from packages/meeting-ingest)
#   - meeting-mcp release tarball   ← tag prefix `meeting-mcp-v...` (from packages/meeting-mcp;
#                                     attaches meeting-mcp-surface-<v>.tgz to a GitHub Release)
#
# All npm packages have npm Trusted Publisher rules pointing at this workflow
# file. Jobs gate on the tag prefix so only one package publishes per tag
# push. Independent release cadences.
#
# Tag conventions (matches governance rule 2, https://github.com/ParachuteComputer/parachute-workspace/blob/main/docs/process/governance.md):
#   - rc:     v<X>.<Y>.<Z>-rc.<N>          (e.g. v0.2.0-rc.10)
#                                          (client-v0.1.0-rc.4)
#                                          (notes-ui-v0.1.4-rc.1)
#                                          (doc-schema-v0.1.0-rc.1)
#                                          (server-v0.1.0-rc.1)
#                                          (docs-editor-v0.1.0-rc.1)
#   - stable: v<X>.<Y>.<Z>                 (e.g. v0.2.0)
#                                          (client-v0.1.0)
#                                          (notes-ui-v0.1.4)
#                                          (doc-schema-v0.1.0)
#                                          (server-v0.1.0)
#                                          (docs-editor-v0.1.0)
#
# Release flow:
#   1. When ready to ship: bump version in the relevant package.json on main.
#   2. Push a matching tag:
#        # for surface
#        VERSION="v$(bun -e "console.log(require('./packages/surface-host/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for surface-client
#        VERSION="client-v$(bun -e "console.log(require('./packages/surface-client/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for notes-ui
#        VERSION="notes-ui-v$(bun -e "console.log(require('./packages/notes-ui/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for doc-schema
#        VERSION="doc-schema-v$(bun -e "console.log(require('./packages/doc-schema/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for surface-server
#        VERSION="server-v$(bun -e "console.log(require('./packages/surface-server/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for docs-editor (GitHub release tarball, not npm)
#        VERSION="docs-editor-v$(bun -e "console.log(require('./packages/docs-editor/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#   3. CI runs tests once (workspace-wide), then publishes the package matching
#      the tag prefix.
#
# Operator setup (one-time) — see RELEASING.md:
#   - npm Trusted Publisher rules: one per package (surface, surface-client,
#     surface-render, notes-ui, doc-schema, surface-server).
#     All six rules point at: org=ParachuteComputer, repo=parachute-surface,
#     workflow=release.yml, env blank.
#   - No NPM_TOKEN secret needed; OIDC.

name: Release

on:
  push:
    tags:
      # App release tags
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # App-client release tags
      - 'client-v[0-9]+.[0-9]+.[0-9]+'
      - 'client-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Surface-render release tags
      - 'render-v[0-9]+.[0-9]+.[0-9]+'
      - 'render-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Notes-ui release tags
      - 'notes-ui-v[0-9]+.[0-9]+.[0-9]+'
      - 'notes-ui-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Doc-schema release tags
      - 'doc-schema-v[0-9]+.[0-9]+.[0-9]+'
      - 'doc-schema-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Surface-server release tags
      - 'server-v[0-9]+.[0-9]+.[0-9]+'
      - 'server-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Docs-editor release tags (GitHub release tarball, not npm)
      - 'docs-editor-v[0-9]+.[0-9]+.[0-9]+'
      - 'docs-editor-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Meeting-ingest release tags (GitHub release tarball, not npm)
      - 'meeting-ingest-v[0-9]+.[0-9]+.[0-9]+'
      - 'meeting-ingest-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Meeting-mcp release tags (GitHub release tarball, not npm)
      - 'meeting-mcp-v[0-9]+.[0-9]+.[0-9]+'
      - 'meeting-mcp-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

concurrency:
  # Don't let two releases race on the same tag.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: install deps
        # Workspace root install — picks up every packages/* workspace and
        # web/admin (the bundled admin SPA).
        run: bun install --frozen-lockfile
      - name: typecheck
        # Root script typechecks all workspace packages (surface-host,
        # surface-client, surface-server, surface-render, notes-ui,
        # pebble-config, doc-schema incl. its no-DOM codec tsconfig).
        run: bun run typecheck:all
      - name: tests
        # Root script runs every suite: surface-host, surface-client,
        # surface-server, pebble-config, doc-schema (bun test), plus notes-ui
        # and surface-render (vitest via `bun run --filter`).
        run: bun run test

  publish-surface-npm:
    name: publish @openparachute/surface to npm
    needs: test
    # App-only: skip on client-, render-, notes-ui-, doc-schema-, server-,
    # docs-editor-, meeting-ingest-, and meeting-mcp- tags. (The bare `v...`
    # namespace is the catch-all: every NEW tag prefix MUST be excluded here,
    # or its tag would fire this job too. `docs-editor-` needs its own
    # exclusion — it does NOT share the `doc-schema-` prefix. Likewise
    # `meeting-mcp-` and `meeting-ingest-` are DISTINCT prefixes — neither
    # `startsWith` the other, so each needs its own exclusion.)
    if: ${{ !startsWith(github.ref_name, 'client-') && !startsWith(github.ref_name, 'render-') && !startsWith(github.ref_name, 'notes-ui-') && !startsWith(github.ref_name, 'doc-schema-') && !startsWith(github.ref_name, 'server-') && !startsWith(github.ref_name, 'docs-editor-') && !startsWith(github.ref_name, 'meeting-ingest-') && !startsWith(github.ref_name, 'meeting-mcp-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance attestation + Trusted Publishing OIDC.
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          # Node 24 ships npm 11.5+ which has Trusted Publishing OIDC
          # support built in. Node 20 LTS only has npm 10 and would
          # silently fall back to token auth (failing without NPM_TOKEN).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root brings in the admin SPA's deps too,
        # so the `build` step below can build dist/admin/.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Defense against tag-vs-package.json drift. If they don't match,
        # we'd publish under the wrong version. We pin on surface-host's
        # package.json — that's the package this workflow publishes.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/surface-host/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/surface-host/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: "guard against workspace:/link: protocol in published manifest"
        # npm publish does NOT rewrite `workspace:`/`link:` protocols (only bun/pnpm
        # do, on their own publish path). A leaked protocol breaks every `npm install`
        # of the published package. surface-host depends on @openparachute/surface-client
        # — fail loudly before publish if any dependency block still carries one.
        # (This job MISSING the guard is exactly what let surface@0.3.3 publish
        # uninstallable — see #152.)
        working-directory: packages/surface-host
        run: |
          if node -e "const p=require('./package.json'); let bad=[]; for (const k of ['dependencies','peerDependencies','optionalDependencies']) { const b=p[k]||{}; for (const [d,v] of Object.entries(b)) if (String(v).startsWith('workspace:')||String(v).startsWith('link:')) bad.push(k+'.'+d+'='+v); } if (bad.length) { console.error(bad.join('\n')); process.exit(1); }"; then
            echo "no workspace:/link: protocols in published manifest"
          else
            echo "::error::packages/surface-host/package.json has workspace:/link: protocol in a published dependency block — convert to concrete semver"
            exit 1
          fi
      - name: build surface-host (bundles admin SPA into dist/)
        # surface-host's `files` includes `dist/admin/**`, so the admin SPA
        # must be built before `npm publish` packs the tarball. The
        # package.json has no prepack/prepublishOnly hook, so we run
        # the build explicitly here.
        working-directory: packages/surface-host
        run: bun run build
      - name: publish
        # Trusted Publishing: npm verifies the OIDC token from this workflow
        # against the package's configured trusted publisher rule
        # (org=ParachuteComputer, repo=parachute-surface, workflow=release.yml).
        # No NPM_TOKEN secret needed; `id-token: write` permission above
        # makes the OIDC token available to npm CLI.
        working-directory: packages/surface-host
        run: |
          # Detect rc vs stable from tag name. Tag pattern in `on:` above
          # enforces the shape, so this is just disambiguation.
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/surface with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-surface-client-npm:
    name: publish @openparachute/surface-client to npm
    needs: test
    # surface-client-only: skip on surface (`v*`) tags.
    if: ${{ startsWith(github.ref_name, 'client-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against surface-client's package.json — that's the package this
        # job publishes. Tag prefix is `client-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/surface-client/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#client-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/surface-client/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: "guard against workspace:/link: protocol in published manifest"
        # npm publish does NOT rewrite `workspace:`/`link:` protocols (only bun/pnpm
        # do, on their own publish path). A leaked protocol breaks every `npm install`
        # of the published package. Fail loudly before publish if any dependency
        # block still carries one.
        working-directory: packages/surface-client
        run: |
          if node -e "const p=require('./package.json'); let bad=[]; for (const k of ['dependencies','peerDependencies','optionalDependencies']) { const b=p[k]||{}; for (const [d,v] of Object.entries(b)) if (String(v).startsWith('workspace:')||String(v).startsWith('link:')) bad.push(k+'.'+d+'='+v); } if (bad.length) { console.error(bad.join('\n')); process.exit(1); }"; then
            echo "no workspace:/link: protocols in published manifest"
          else
            echo "::error::packages/surface-client/package.json has workspace:/link: protocol in a published dependency block — convert to concrete semver"
            exit 1
          fi
      - name: publish
        # surface-client's package.json has `prepublishOnly: bun run build`, so
        # `npm publish` will build (tsc) before packing. No explicit build
        # step needed here.
        working-directory: packages/surface-client
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/surface-client with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-surface-render-npm:
    name: publish @openparachute/surface-render to npm
    needs: test
    # surface-render-only: gate on the `render-v...` tag prefix.
    if: ${{ startsWith(github.ref_name, 'render-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against surface-render's package.json — that's the package this
        # job publishes. Tag prefix is `render-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/surface-render/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#render-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/surface-render/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: "guard against workspace:/link: protocol in published manifest"
        # npm publish does NOT rewrite `workspace:`/`link:` protocols (only bun/pnpm
        # do, on their own publish path). A leaked protocol breaks every `npm install`
        # of the published package. surface-render depends on surface-client — fail
        # loudly before publish if that dep (or any other) still carries a protocol.
        working-directory: packages/surface-render
        run: |
          if node -e "const p=require('./package.json'); let bad=[]; for (const k of ['dependencies','peerDependencies','optionalDependencies']) { const b=p[k]||{}; for (const [d,v] of Object.entries(b)) if (String(v).startsWith('workspace:')||String(v).startsWith('link:')) bad.push(k+'.'+d+'='+v); } if (bad.length) { console.error(bad.join('\n')); process.exit(1); }"; then
            echo "no workspace:/link: protocols in published manifest"
          else
            echo "::error::packages/surface-render/package.json has workspace:/link: protocol in a published dependency block — convert to concrete semver"
            exit 1
          fi
      - name: publish
        # surface-render's package.json has `prepublishOnly: bun run build`, so
        # `npm publish` will build (tsc) before packing. No explicit build
        # step needed here.
        working-directory: packages/surface-render
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/surface-render with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-notes-ui-npm:
    name: publish @openparachute/notes-ui to npm
    needs: test
    # notes-ui-only: skip on surface and surface-client tags.
    if: ${{ startsWith(github.ref_name, 'notes-ui-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root brings in notes-ui's deps.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against notes-ui's package.json; tag prefix is `notes-ui-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/notes-ui/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#notes-ui-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/notes-ui/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: "guard against workspace:/link: protocol in published manifest"
        # npm publish does NOT rewrite `workspace:`/`link:` protocols (only bun/pnpm
        # do, on their own publish path). A leaked protocol breaks every `npm install`
        # of the published package. notes-ui depends on @openparachute/surface-client
        # via `workspace:*` for the live-list dogfood, so this guard is load-bearing:
        # fail loudly before publish if any dependency block still carries one.
        working-directory: packages/notes-ui
        run: |
          if node -e "const p=require('./package.json'); let bad=[]; for (const k of ['dependencies','peerDependencies','optionalDependencies']) { const b=p[k]||{}; for (const [d,v] of Object.entries(b)) if (String(v).startsWith('workspace:')||String(v).startsWith('link:')) bad.push(k+'.'+d+'='+v); } if (bad.length) { console.error(bad.join('\n')); process.exit(1); }"; then
            echo "no workspace:/link: protocols in published manifest"
          else
            echo "::error::packages/notes-ui/package.json has workspace:/link: protocol in a published dependency block — convert to concrete semver"
            exit 1
          fi
      - name: publish
        # notes-ui's package.json has `prepublishOnly: bun run build`, which
        # runs `tsc -b && vite build` to produce `dist/` (the published artifact).
        # `npm publish` triggers prepublishOnly, so the build happens just-in-time.
        working-directory: packages/notes-ui
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/notes-ui with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-doc-schema-npm:
    name: publish @openparachute/doc-schema to npm
    needs: test
    # doc-schema-only: gate on the `doc-schema-v...` tag prefix.
    if: ${{ startsWith(github.ref_name, 'doc-schema-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against doc-schema's package.json; tag prefix is `doc-schema-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/doc-schema/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#doc-schema-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/doc-schema/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: "guard against workspace:/link: protocol in published manifest"
        # npm publish does NOT rewrite `workspace:`/`link:` protocols (only bun/pnpm
        # do, on their own publish path). A leaked protocol breaks every `npm install`
        # of the published package. Fail loudly before publish if any dependency
        # block still carries one (same guard as the sibling publish jobs).
        working-directory: packages/doc-schema
        run: |
          if node -e "const p=require('./package.json'); let bad=[]; for (const k of ['dependencies','peerDependencies','optionalDependencies']) { const b=p[k]||{}; for (const [d,v] of Object.entries(b)) if (String(v).startsWith('workspace:')||String(v).startsWith('link:')) bad.push(k+'.'+d+'='+v); } if (bad.length) { console.error(bad.join('\n')); process.exit(1); }"; then
            echo "no workspace:/link: protocols in published manifest"
          else
            echo "::error::packages/doc-schema/package.json has workspace:/link: protocol in a published dependency block — convert to concrete semver"
            exit 1
          fi
      - name: publish
        # doc-schema's package.json has `prepublishOnly: bun run build` (tsc →
        # dist/, the published artifact), so `npm publish` builds just-in-time.
        working-directory: packages/doc-schema
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/doc-schema with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-surface-server-npm:
    name: publish @openparachute/surface-server to npm
    needs: test
    # surface-server-only: gate on the `server-v...` tag prefix.
    if: ${{ startsWith(github.ref_name, 'server-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against surface-server's package.json; tag prefix is `server-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/surface-server/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#server-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/surface-server/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: "guard against workspace:/link: protocol in published manifest"
        # npm publish does NOT rewrite `workspace:`/`link:` protocols (only bun/pnpm
        # do, on their own publish path). A leaked protocol breaks every `npm install`
        # of the published package. surface-server depends on @openparachute/surface
        # and @openparachute/surface-client — fail loudly before publish if any dep
        # still carries a protocol.
        working-directory: packages/surface-server
        run: |
          if node -e "const p=require('./package.json'); let bad=[]; for (const k of ['dependencies','peerDependencies','optionalDependencies']) { const b=p[k]||{}; for (const [d,v] of Object.entries(b)) if (String(v).startsWith('workspace:')||String(v).startsWith('link:')) bad.push(k+'.'+d+'='+v); } if (bad.length) { console.error(bad.join('\n')); process.exit(1); }"; then
            echo "no workspace:/link: protocols in published manifest"
          else
            echo "::error::packages/surface-server/package.json has workspace:/link: protocol in a published dependency block — convert to concrete semver"
            exit 1
          fi
      - name: publish
        # surface-server publishes raw TypeScript sources (`files: src/**/*.ts`,
        # exports point at src/) — no build step, nothing to compile before pack.
        working-directory: packages/surface-server
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
