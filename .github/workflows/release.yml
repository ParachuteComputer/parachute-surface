# Release workflow — triggered by pushing a semver tag.
#
# This workflow publishes THREE packages on different tag namespaces:
#
#   - @openparachute/surface      ← tag prefix `v...`          (from packages/surface-host)
#   - @openparachute/surface-client ← tag prefix `client-v...`   (from packages/surface-client)
#   - @openparachute/notes-ui     ← tag prefix `notes-ui-v...` (from packages/notes-ui)
#
# All packages have npm Trusted Publisher rules pointing at this workflow
# file. Jobs gate on the tag prefix so only one package publishes per tag
# push. Independent release cadences.
#
# Tag conventions (matches parachute-patterns governance rule 2):
#   - rc:     v<X>.<Y>.<Z>-rc.<N>          (e.g. v0.2.0-rc.10)
#                                          (client-v0.1.0-rc.4)
#                                          (notes-ui-v0.1.4-rc.1)
#   - stable: v<X>.<Y>.<Z>                 (e.g. v0.2.0)
#                                          (client-v0.1.0)
#                                          (notes-ui-v0.1.4)
#
# Release flow:
#   1. When ready to ship: bump version in the relevant package.json on main.
#   2. Push a matching tag:
#        # for surface
#        VERSION="v$(bun -e "console.log(require('./packages/surface-host/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for surface-client
#        VERSION="client-v$(bun -e "console.log(require('./packages/surface-client/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#        # for notes-ui
#        VERSION="notes-ui-v$(bun -e "console.log(require('./packages/notes-ui/package.json').version)")"
#        git tag "$VERSION" && git push origin "$VERSION"
#   3. CI runs tests once (workspace-wide), then publishes the package matching
#      the tag prefix.
#
# Operator setup (one-time) — see RELEASING.md:
#   - npm Trusted Publisher rules: one per package (surface, surface-client, notes-ui).
#     All three rules point at: org=ParachuteComputer, repo=parachute-surface,
#     workflow=release.yml, env blank.
#   - No NPM_TOKEN secret needed; OIDC.

name: Release

on:
  push:
    tags:
      # App release tags
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # App-client release tags
      - 'client-v[0-9]+.[0-9]+.[0-9]+'
      - 'client-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
      # Notes-ui release tags
      - 'notes-ui-v[0-9]+.[0-9]+.[0-9]+'
      - 'notes-ui-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

concurrency:
  # Don't let two releases race on the same tag.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: install deps
        # Workspace root install — picks up packages/surface-host, packages/surface-client,
        # and web/admin (the bundled admin SPA).
        run: bun install --frozen-lockfile
      - name: typecheck
        # Root script typechecks all three packages (surface-host, surface-client, notes-ui).
        run: bun run typecheck
      - name: tests
        # Root script runs all three suites: surface-host (bun test), surface-client
        # (bun test), and notes-ui (vitest via `bun run --filter`).
        run: bun run test

  publish-surface-npm:
    name: publish @openparachute/surface to npm
    needs: test
    # App-only: skip on client- and notes-ui- tags.
    if: ${{ !startsWith(github.ref_name, 'client-') && !startsWith(github.ref_name, 'notes-ui-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance attestation + Trusted Publishing OIDC.
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          # Node 24 ships npm 11.5+ which has Trusted Publishing OIDC
          # support built in. Node 20 LTS only has npm 10 and would
          # silently fall back to token auth (failing without NPM_TOKEN).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root brings in the admin SPA's deps too,
        # so the `build` step below can build dist/admin/.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Defense against tag-vs-package.json drift. If they don't match,
        # we'd publish under the wrong version. We pin on surface-host's
        # package.json — that's the package this workflow publishes.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/surface-host/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/surface-host/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: build surface-host (bundles admin SPA into dist/)
        # surface-host's `files` includes `dist/admin/**`, so the admin SPA
        # must be built before `npm publish` packs the tarball. The
        # package.json has no prepack/prepublishOnly hook, so we run
        # the build explicitly here.
        working-directory: packages/surface-host
        run: bun run build
      - name: publish
        # Trusted Publishing: npm verifies the OIDC token from this workflow
        # against the package's configured trusted publisher rule
        # (org=ParachuteComputer, repo=parachute-surface, workflow=release.yml).
        # No NPM_TOKEN secret needed; `id-token: write` permission above
        # makes the OIDC token available to npm CLI.
        working-directory: packages/surface-host
        run: |
          # Detect rc vs stable from tag name. Tag pattern in `on:` above
          # enforces the shape, so this is just disambiguation.
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/surface with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-surface-client-npm:
    name: publish @openparachute/surface-client to npm
    needs: test
    # surface-client-only: skip on surface (`v*`) tags.
    if: ${{ startsWith(github.ref_name, 'client-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against surface-client's package.json — that's the package this
        # job publishes. Tag prefix is `client-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/surface-client/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#client-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/surface-client/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: publish
        # surface-client's package.json has `prepublishOnly: bun run build`, so
        # `npm publish` will build (tsc) before packing. No explicit build
        # step needed here.
        working-directory: packages/surface-client
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/surface-client with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance

  publish-notes-ui-npm:
    name: publish @openparachute/notes-ui to npm
    needs: test
    # notes-ui-only: skip on surface and surface-client tags.
    if: ${{ startsWith(github.ref_name, 'notes-ui-') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root brings in notes-ui's deps.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Pin against notes-ui's package.json; tag prefix is `notes-ui-v...`.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/notes-ui/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#notes-ui-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/notes-ui/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: publish
        # notes-ui's package.json has `prepublishOnly: bun run build`, which
        # runs `tsc -b && vite build` to produce `dist/` (the published artifact).
        # `npm publish` triggers prepublishOnly, so the build happens just-in-time.
        working-directory: packages/notes-ui
        run: |
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/notes-ui with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance
