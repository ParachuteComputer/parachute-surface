# Release workflow — triggered by pushing a semver tag.
#
# Scope:
#   This workflow publishes ONLY `@openparachute/app` (from packages/app-host).
#   `@openparachute/app-client` ships on its own cadence; its release CI is a
#   follow-up. See RELEASING.md.
#
# Tag conventions (matches parachute-patterns governance rule 2):
#   - rc:     v<X>.<Y>.<Z>-rc.<N>   (e.g. v0.2.0-rc.10)
#   - stable: v<X>.<Y>.<Z>          (e.g. v0.2.0)
#
# Release flow:
#   1. Code-touching PR merges to main, bumping `version` in
#      packages/app-host/package.json (rc.N → rc.N+1 for the rc chain; or
#      drop -rc.N suffix for stable).
#   2. After merge, push a matching tag:
#        git tag v$(bun -e "console.log(require('./packages/app-host/package.json').version)") && git push --tags
#   3. CI runs tests, then publishes to npm (with provenance attestation,
#      dist-tag = rc or latest).
#
# Operator setup (one-time):
#   - npmjs.com → package @openparachute/app → Settings → Trusted Publishers
#     → add GitHub Actions (org=ParachuteComputer, repo=parachute-app,
#       workflow=release.yml, env=blank).
#   - No NPM_TOKEN secret needed; we use OIDC.
#
# Why tag-triggered (not push-to-main):
#   - tag = explicit release signal; main commits without a tag don't publish.
#   - Preserves a deliberate gate (you push the tag when you mean to ship).
#   - Tag-as-canonical means the tag itself is the audit trail of what was
#     released and when.

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

concurrency:
  # Don't let two releases race on the same tag.
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: install deps
        # Workspace root install — picks up packages/app-host, packages/app-client,
        # and web/admin (the bundled admin SPA).
        run: bun install --frozen-lockfile
      - name: typecheck
        # Root script typechecks both app-host + app-client.
        run: bun run typecheck
      - name: tests
        # Root script runs app-host + app-client suites.
        run: bun run test

  publish-npm:
    name: publish @openparachute/app to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm provenance attestation + Trusted Publishing OIDC.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - uses: actions/setup-node@v4
        with:
          # Node 24 ships npm 11.5+ which has Trusted Publishing OIDC
          # support built in. Node 20 LTS only has npm 10 and would
          # silently fall back to token auth (failing without NPM_TOKEN).
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: install deps
        # Workspace install at root brings in the admin SPA's deps too,
        # so the `build` step below can build dist/admin/.
        run: bun install --frozen-lockfile
      - name: verify package.json version matches tag
        # Defense against tag-vs-package.json drift. If they don't match,
        # we'd publish under the wrong version. We pin on app-host's
        # package.json — that's the package this workflow publishes.
        run: |
          PKG_VERSION=$(bun -e "console.log(require('./packages/app-host/package.json').version)")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::packages/app-host/package.json version ($PKG_VERSION) doesn't match tag ($TAG_VERSION)"
            exit 1
          fi
      - name: build app-host (bundles admin SPA into dist/)
        # app-host's `files` includes `dist/admin/**`, so the admin SPA
        # must be built before `npm publish` packs the tarball. The
        # package.json has no prepack/prepublishOnly hook, so we run
        # the build explicitly here.
        working-directory: packages/app-host
        run: bun run build
      - name: publish
        # Trusted Publishing: npm verifies the OIDC token from this workflow
        # against the package's configured trusted publisher rule
        # (org=ParachuteComputer, repo=parachute-app, workflow=release.yml).
        # No NPM_TOKEN secret needed; `id-token: write` permission above
        # makes the OIDC token available to npm CLI.
        working-directory: packages/app-host
        run: |
          # Detect rc vs stable from tag name. Tag pattern in `on:` above
          # enforces the shape, so this is just disambiguation.
          if [[ "$GITHUB_REF_NAME" =~ -rc\. ]]; then
            DIST_TAG=rc
          else
            DIST_TAG=latest
          fi
          echo "publishing @openparachute/app with dist-tag=$DIST_TAG"
          npm publish --tag "$DIST_TAG" --access public --provenance
